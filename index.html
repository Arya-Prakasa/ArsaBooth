<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArsaBooth – Photo Booth Online</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Sans:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --void:     #0C0820;
  --booth:    #16103A;
  --card:     #1C1548;
  --neon:     #FF2D78;
  --gold:     #FFD700;
  --teal:     #00E5CC;
  --film:     #111111;
  --strip-bg: #F5EFE0;
  --text:     #EDE8FF;
  --muted:    #7A6FA8;
  --border:   rgba(255,215,0,0.18);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--void);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,45,120,0.12),transparent),
    radial-gradient(ellipse 60% 40% at 80% 90%,rgba(0,229,204,0.07),transparent);
}

/* ── HEADER ── */
header{ text-align:center; padding:1.6rem 1rem 0.8rem; }

.lights{ display:flex; justify-content:center; gap:10px; margin-bottom:1rem; }
.light{ width:9px;height:9px;border-radius:50%; animation:blink 1.8s ease-in-out infinite; }
.light:nth-child(1){background:#FFD700;box-shadow:0 0 8px #FFD700;animation-delay:0s;}
.light:nth-child(2){background:#FF2D78;box-shadow:0 0 8px #FF2D78;animation-delay:.25s;}
.light:nth-child(3){background:#00E5CC;box-shadow:0 0 8px #00E5CC;animation-delay:.5s;}
.light:nth-child(4){background:#FFD700;box-shadow:0 0 8px #FFD700;animation-delay:.75s;}
.light:nth-child(5){background:#FF2D78;box-shadow:0 0 8px #FF2D78;animation-delay:1s;}
.light:nth-child(6){background:#00E5CC;box-shadow:0 0 8px #00E5CC;animation-delay:1.25s;}
.light:nth-child(7){background:#FFD700;box-shadow:0 0 8px #FFD700;animation-delay:1.5s;}

@keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.2;} }

.brand{
  font-family:'Bungee',cursive;
  font-size:clamp(2.8rem,7vw,4.5rem);
  color:var(--gold);
  text-shadow:0 0 30px rgba(255,215,0,.5),5px 5px 0 var(--neon);
  line-height:1; letter-spacing:.04em;
}
.tagline{
  font-family:'Space Mono',monospace;
  font-size:.72rem; letter-spacing:.35em;
  text-transform:uppercase; color:var(--muted); margin-top:.5rem;
}

/* ── APP LAYOUT ── */
.app{
  display:grid; grid-template-columns:1fr 220px;
  gap:1.8rem; padding:1.5rem 2rem 2.5rem;
  max-width:1050px; margin:0 auto; width:100%; flex:1;
}

/* ── CAMERA SECTION ── */
.camera-section{ display:flex; flex-direction:column; gap:1rem; }

.camera-frame{
  position:relative; background:var(--booth);
  border-radius:14px; overflow:hidden; aspect-ratio:4/3;
  border:2px solid var(--border);
  box-shadow:0 0 50px rgba(255,45,120,.1),inset 0 0 60px rgba(0,0,0,.5);
}

#video{
  width:100%;height:100%; object-fit:cover; display:block;
  transform:scaleX(-1); transition:filter .3s;
}

.f-none   {filter:none;}
.f-noir   {filter:grayscale(1) contrast(1.15);}
.f-sepia  {filter:sepia(.9) brightness(1.06);}
.f-vivid  {filter:saturate(1.9) contrast(1.15);}
.f-vintage{filter:sepia(.35) brightness(.95) hue-rotate(-10deg) saturate(.8);}
.f-cool   {filter:hue-rotate(195deg) saturate(1.3) brightness(1.05);}
.f-warm   {filter:sepia(.2) saturate(1.5) brightness(1.05) hue-rotate(10deg);}

.flash-overlay{
  position:absolute;inset:0; background:white;
  opacity:0;pointer-events:none;z-index:10;
}
.flash-overlay.active{ animation:flashPop .45s ease-out forwards; }
@keyframes flashPop{ 0%{opacity:1;} 100%{opacity:0;} }

.countdown{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bungee',cursive; font-size:9rem; color:var(--gold);
  text-shadow:0 0 40px rgba(255,215,0,.9),5px 5px 0 var(--neon);
  z-index:5; opacity:0; pointer-events:none;
  transition:opacity .15s,transform .15s; transform:scale(1.3);
}
.countdown.show{ opacity:1; transform:scale(1); }

.shot-badge{
  position:absolute;top:14px;left:14px;
  background:var(--neon); color:#fff;
  font-family:'Space Mono',monospace;
  font-size:.68rem;font-weight:700;
  padding:.3rem .75rem; border-radius:100px;
  z-index:6; opacity:0; transform:translateY(-4px);
  transition:opacity .25s,transform .25s;
}
.shot-badge.show{opacity:1;transform:translateY(0);}

.corner{position:absolute;width:22px;height:22px;border-color:var(--gold);border-style:solid;opacity:.6;z-index:4;}
.corner.tl{top:14px;left:14px;border-width:2px 0 0 2px;}
.corner.tr{top:14px;right:14px;border-width:2px 2px 0 0;}
.corner.bl{bottom:14px;left:14px;border-width:0 0 2px 2px;}
.corner.br{bottom:14px;right:14px;border-width:0 2px 2px 0;}

.no-cam{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.9rem; font-family:'Space Mono',monospace;
  font-size:.8rem;color:var(--muted);
  text-align:center;padding:1.5rem; background:var(--booth);
}
.no-cam .cam-icon{font-size:3.5rem;margin-bottom:.25rem;}
.no-cam p{line-height:1.6;color:var(--muted);}

/* ── FILTERS ── */
.section-label{
  font-family:'Space Mono',monospace;
  font-size:.65rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted); margin-bottom:.4rem;
}
.filters{ display:grid; grid-template-columns:repeat(4,1fr); gap:.4rem; }
.filter-btn{
  padding:.55rem .3rem; border-radius:8px;
  border:1.5px solid var(--border); background:var(--card); color:var(--muted);
  font-family:'Space Mono',monospace; font-size:.62rem;
  cursor:pointer; transition:all .18s;
  text-transform:uppercase; letter-spacing:.03em; text-align:center;
}
.filter-btn:hover{border-color:var(--gold);color:var(--gold);}
.filter-btn.active{background:var(--gold);color:var(--void);border-color:var(--gold);font-weight:700;}

.swatch{ display:block;width:24px;height:7px;border-radius:4px;margin:0 auto .35rem; }
.sw-none   {background:linear-gradient(to right,#ff9,#99f,#f9f);}
.sw-noir   {background:linear-gradient(to right,#222,#888,#fff);}
.sw-sepia  {background:linear-gradient(to right,#8B6343,#C8935A,#E8C49A);}
.sw-vivid  {background:linear-gradient(to right,#f00,#0f0,#00f);}
.sw-vintage{background:linear-gradient(to right,#A07843,#C8A060,#E0C890);}
.sw-cool   {background:linear-gradient(to right,#004488,#0088CC,#44CCFF);}
.sw-warm   {background:linear-gradient(to right,#CC4400,#FF8844,#FFD0A0);}

/* ── BUTTONS ── */
.start-btn{
  width:100%;padding:1rem; border:none; border-radius:12px;
  background:linear-gradient(135deg,var(--neon) 0%,#CC0044 100%);
  color:white; font-family:'Bungee',cursive;
  font-size:1.25rem;letter-spacing:.1em;
  cursor:pointer; transition:all .2s;
  box-shadow:0 4px 22px rgba(255,45,120,.4);
}
.start-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,45,120,.5);}
.start-btn:active:not(:disabled){transform:translateY(0);}
.start-btn:disabled{opacity:.45;cursor:not-allowed;}

.status{
  text-align:center; font-family:'Space Mono',monospace;
  font-size:.72rem;color:var(--muted);
  min-height:1.4em;letter-spacing:.04em;
}
.status.active{color:var(--teal);}
.status.error{color:var(--neon);}

/* ── FILMSTRIP ── */
.strip-section{ display:flex;flex-direction:column;gap:.7rem; }

.filmstrip{
  background:var(--film); border-radius:3px;
  position:relative; overflow:visible;
  box-shadow:0 0 0 1px #2a2a2a,10px 10px 40px rgba(0,0,0,.6);
  padding:0 20px;
}

.sprocket-col{
  position:absolute;top:0;bottom:0;width:18px;
  display:flex;flex-direction:column;
  justify-content:space-around; padding:10px 0;
  z-index:2;pointer-events:none;
}
.sprocket-col.l{left:1px;}
.sprocket-col.r{right:1px;}

.sp-hole{
  width:12px;height:9px; background:var(--void);
  border-radius:2px; margin:0 auto;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
}

.strip-inner{ padding:12px 2px; display:flex;flex-direction:column; gap:0; }

.strip-top{
  text-align:center; font-family:'Space Mono',monospace;
  font-size:.5rem;letter-spacing:.25em;
  color:#444;text-transform:uppercase;
  padding-bottom:8px; border-bottom:1px solid #2a2a2a; margin-bottom:6px;
}

.photos{ display:flex;flex-direction:column; gap:4px; }

.photo-slot{
  aspect-ratio:4/3; background:#1a1a1a;
  border-radius:1px; overflow:hidden; position:relative;
}
.photo-slot img{ width:100%;height:100%; object-fit:cover;display:block; }
.empty-num{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;
  font-size:.65rem;color:#2d2d2d; letter-spacing:.1em;
}
.photo-slot.new img{ animation:revealPhoto .4s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes revealPhoto{ from{opacity:0;transform:scale(.88);} to{opacity:1;transform:scale(1);} }

.strip-bot{
  text-align:center; font-family:'Space Mono',monospace;
  font-size:.48rem;letter-spacing:.2em; color:#3a3a3a;
  padding-top:8px; border-top:1px solid #2a2a2a; margin-top:6px;
}

.download-btn{
  width:100%;padding:.75rem;
  border:1.5px solid var(--teal);border-radius:9px;
  background:transparent;color:var(--teal);
  font-family:'Bungee',cursive;font-size:.85rem;letter-spacing:.08em;
  cursor:pointer;transition:all .2s;
}
.download-btn:hover:not(:disabled){background:var(--teal);color:var(--void);box-shadow:0 4px 18px rgba(0,229,204,.3);}
.download-btn:disabled{opacity:.3;cursor:not-allowed;}

.reset-btn{
  width:100%;padding:.5rem;
  border:1.5px solid rgba(255,45,120,.25);border-radius:9px;
  background:transparent;color:var(--muted);
  font-family:'Space Mono',monospace;font-size:.66rem;
  text-transform:uppercase;letter-spacing:.06em;
  cursor:pointer;transition:all .2s;
}
.reset-btn:hover{border-color:var(--neon);color:var(--neon);}

canvas{display:none;}

/* ── RESPONSIVE ── */
@media(max-width:680px){
  .app{ grid-template-columns:1fr; padding:1rem;gap:1.4rem; }
  .strip-section{ flex-direction:row;align-items:flex-start;gap:1rem; }
  .filmstrip{width:180px;flex-shrink:0;}
  .strip-controls{flex:1;display:flex;flex-direction:column;gap:.6rem;justify-content:center;}
  .filters{grid-template-columns:repeat(4,1fr);}
}
@media(max-width:400px){
  .filmstrip{width:150px;}
  .filters{grid-template-columns:repeat(3,1fr);}
}

.photo-slot.loading{
  background:linear-gradient(90deg,#1a1a1a 25%,#2a2a2a 50%,#1a1a1a 75%);
  background-size:200% 100%; animation:shimmer 1.2s infinite;
}
@keyframes shimmer{ from{background-position:200% center;} to{background-position:-200% center;} }

.camera-frame::after{
  content:''; position:absolute;inset:0;
  border-radius:14px; pointer-events:none; transition:box-shadow .15s;
}
.camera-frame.capturing::after{ box-shadow:inset 0 0 0 3px var(--neon); }
</style>
</head>
<body>

<header>
  <div class="lights">
    <div class="light"></div><div class="light"></div><div class="light"></div>
    <div class="light"></div><div class="light"></div><div class="light"></div>
    <div class="light"></div>
  </div>
  <div class="brand">ArsaBooth</div>
  <div class="tagline">✦ Cetak kenangan sekejap ✦</div>
</header>

<main class="app">

  <!-- Left: Camera -->
  <div class="camera-section">
    <div class="camera-frame" id="cameraFrame">
      <video id="video" autoplay playsinline muted></video>
      <div class="flash-overlay" id="flash"></div>
      <div class="countdown" id="countdown"></div>
      <div class="shot-badge" id="shotBadge"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="no-cam" id="noCam">
        <div class="cam-icon">📷</div>
        <p>Izinkan akses kamera<br>untuk memulai sesi foto</p>
        <button class="start-btn" style="width:auto;padding:.65rem 1.6rem;font-size:.95rem;margin-top:.25rem;" onclick="initCamera()">Aktifkan Kamera</button>
      </div>
    </div>

    <div>
      <div class="section-label">Filter</div>
      <div class="filters" id="filtersRow">
        <button class="filter-btn active" data-filter="f-none"    onclick="setFilter(this)"><span class="swatch sw-none"></span>Normal</button>
        <button class="filter-btn"        data-filter="f-noir"    onclick="setFilter(this)"><span class="swatch sw-noir"></span>Noir</button>
        <button class="filter-btn"        data-filter="f-sepia"   onclick="setFilter(this)"><span class="swatch sw-sepia"></span>Sepia</button>
        <button class="filter-btn"        data-filter="f-vivid"   onclick="setFilter(this)"><span class="swatch sw-vivid"></span>Vivid</button>
        <button class="filter-btn"        data-filter="f-vintage" onclick="setFilter(this)"><span class="swatch sw-vintage"></span>Vintage</button>
        <button class="filter-btn"        data-filter="f-cool"    onclick="setFilter(this)"><span class="swatch sw-cool"></span>Cool</button>
        <button class="filter-btn"        data-filter="f-warm"    onclick="setFilter(this)"><span class="swatch sw-warm"></span>Warm</button>
      </div>
    </div>

    <div class="status" id="status">Mengaktifkan kamera…</div>
    <button class="start-btn" id="startBtn" onclick="startSession()" disabled>
      📸 &nbsp;Ambil 4 Foto
    </button>
  </div>

  <!-- Right: Filmstrip -->
  <div class="strip-section">
    <div class="filmstrip" id="filmstrip">
      <div class="sprocket-col l" id="spL"></div>
      <div class="sprocket-col r" id="spR"></div>
      <div class="strip-inner">
        <div class="strip-top">✦ &nbsp;ArsaBooth&nbsp; ✦</div>
        <div class="photos" id="photosEl">
          <div class="photo-slot" id="slot0"><div class="empty-num">01</div></div>
          <div class="photo-slot" id="slot1"><div class="empty-num">02</div></div>
          <div class="photo-slot" id="slot2"><div class="empty-num">03</div></div>
          <div class="photo-slot" id="slot3"><div class="empty-num">04</div></div>
        </div>
        <div class="strip-bot" id="stripDate">── ✦ ──</div>
      </div>
    </div>
    <div class="strip-controls">
      <button class="download-btn" id="downloadBtn" onclick="downloadStrip()" disabled>⬇ &nbsp;Simpan Strip</button>
      <button class="reset-btn" id="resetBtn" onclick="resetSession()">↺ &nbsp;Ulang Sesi</button>
    </div>
  </div>

</main>

<canvas id="canvas"></canvas>

<script>
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d');
const flash       = document.getElementById('flash');
const countdownEl = document.getElementById('countdown');
const shotBadge   = document.getElementById('shotBadge');
const startBtn    = document.getElementById('startBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusEl    = document.getElementById('status');
const noCam       = document.getElementById('noCam');
const cameraFrame = document.getElementById('cameraFrame');

let currentFilter  = 'f-none';
let capturedPhotos = [];
let isRunning      = false;
let stream         = null;

/* Sprocket holes */
(function buildSprockets(){
  const count = 9;
  ['spL','spR'].forEach(id => {
    const el = document.getElementById(id);
    for(let i=0;i<count;i++){
      const h = document.createElement('div');
      h.className = 'sp-hole';
      el.appendChild(h);
    }
  });
})();

/* Camera */
async function initCamera(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:1280},height:{ideal:960},facingMode:'user'},
      audio:false
    });
    video.srcObject = stream;
    noCam.style.display = 'none';
    video.style.display = 'block';
    startBtn.disabled = false;
    setStatus('Kamera siap! Pilih filter lalu tekan tombol foto.','active');
  } catch(err){
    console.error(err);
    noCam.innerHTML = `
      <div class="cam-icon">⚠️</div>
      <p>Akses kamera ditolak.<br><small style="opacity:.6;">${err.message}</small></p>
      <button class="start-btn" style="width:auto;padding:.65rem 1.6rem;font-size:.95rem;margin-top:.25rem;" onclick="initCamera()">Coba Lagi</button>`;
    setStatus('Akses kamera ditolak.','error');
  }
}

/* Filter */
function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  video.className = currentFilter;
  video.style.transform = 'scaleX(-1)';
}

/* Helpers */
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function setStatus(msg,cls=''){
  statusEl.textContent = msg;
  statusEl.className = 'status' + (cls ? ' '+cls : '');
}

async function showCountdown(num){
  countdownEl.textContent = (num===0) ? '📸' : num;
  countdownEl.classList.add('show');
  await sleep(820);
  countdownEl.classList.remove('show');
  await sleep(130);
}

function doFlash(){
  flash.classList.remove('active');
  void flash.offsetWidth;
  flash.classList.add('active');
}

function setSlotLoading(i){
  const slot = document.getElementById('slot'+i);
  slot.innerHTML = '';
  slot.classList.add('loading');
}

function fillSlot(i, dataUrl){
  const slot = document.getElementById('slot'+i);
  slot.classList.remove('loading');
  slot.classList.add('new');
  const img = new Image();
  img.onload = ()=>{ slot.innerHTML=''; slot.appendChild(img); };
  img.src = dataUrl;
}

/* Capture */
const FILTER_MAP = {
  'f-none':    'none',
  'f-noir':    'grayscale(1) contrast(1.15)',
  'f-sepia':   'sepia(.9) brightness(1.06)',
  'f-vivid':   'saturate(1.9) contrast(1.15)',
  'f-vintage': 'sepia(.35) brightness(.95) hue-rotate(-10deg) saturate(.8)',
  'f-cool':    'hue-rotate(195deg) saturate(1.3) brightness(1.05)',
  'f-warm':    'sepia(.2) saturate(1.5) brightness(1.05) hue-rotate(10deg)',
};

function grabFrame(){
  const W = video.videoWidth  || 640;
  const H = video.videoHeight || 480;
  const c = document.createElement('canvas');
  c.width=W; c.height=H;
  const cx = c.getContext('2d');
  cx.translate(W,0);
  cx.scale(-1,1);
  cx.filter = FILTER_MAP[currentFilter] || 'none';
  cx.drawImage(video,0,0,W,H);
  return c.toDataURL('image/jpeg',.92);
}

/* Session */
async function startSession(){
  if(isRunning || !stream) return;
  isRunning = true;
  capturedPhotos = [];
  startBtn.disabled = true;
  downloadBtn.disabled = true;
  document.querySelectorAll('.filter-btn').forEach(b=>b.style.pointerEvents='none');

  for(let i=0;i<4;i++){
    const slot = document.getElementById('slot'+i);
    slot.className = 'photo-slot';
    slot.innerHTML = `<div class="empty-num">0${i+1}</div>`;
  }
  document.getElementById('stripDate').textContent = '── ✦ ──';

  for(let i=0;i<4;i++){
    shotBadge.textContent = `FOTO ${i+1}/4`;
    shotBadge.classList.add('show');
    cameraFrame.classList.add('capturing');
    setStatus(`Bersiap untuk foto ${i+1} dari 4…`,'active');

    await showCountdown(3);
    await showCountdown(2);
    await showCountdown(1);
    await showCountdown(0);

    doFlash();
    setSlotLoading(i);
    const dataUrl = grabFrame();
    capturedPhotos.push(dataUrl);

    shotBadge.classList.remove('show');
    cameraFrame.classList.remove('capturing');

    await sleep(80);
    fillSlot(i, dataUrl);
    setStatus(`✓ Foto ${i+1} diambil!`,'active');

    if(i<3) await sleep(1300);
  }

  const now = new Date();
  document.getElementById('stripDate').textContent =
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;

  setStatus('🎉 Sesi selesai! Strip foto siap untuk disimpan.','active');
  startBtn.disabled = false;
  downloadBtn.disabled = false;
  document.querySelectorAll('.filter-btn').forEach(b=>b.style.pointerEvents='');
  isRunning = false;
}

function pad(n){ return String(n).padStart(2,'0'); }

/* Download */
async function downloadStrip(){
  if(capturedPhotos.length<4) return;

  const PH=300, PW=400, PAD_X=22, PAD_Y=18, GAP=5, SP=20;
  const HEADER=34, FOOTER=28;
  const W = PW + PAD_X*2 + SP*2;
  const H = PAD_Y*2 + HEADER + PH*4 + GAP*3 + FOOTER;

  const sc = document.createElement('canvas');
  sc.width=W; sc.height=H;
  const sctx = sc.getContext('2d');

  sctx.fillStyle='#111';
  sctx.fillRect(0,0,W,H);
  drawSprockets(sctx,W,H,SP);

  sctx.fillStyle='#555';
  sctx.font='bold 10px "Courier New",monospace';
  sctx.textAlign='center';
  sctx.fillText('✦  ArsaBooth  ✦', W/2, PAD_Y+20);

  sctx.strokeStyle='#333'; sctx.lineWidth=1;
  sctx.beginPath();
  sctx.moveTo(SP+PAD_X, PAD_Y+26);
  sctx.lineTo(W-SP-PAD_X, PAD_Y+26);
  sctx.stroke();

  let y = PAD_Y + HEADER;
  const x = SP + PAD_X;
  for(let i=0;i<4;i++){
    await drawImg(sctx, capturedPhotos[i], x, y, PW, PH);
    y += PH + GAP;
  }

  sctx.strokeStyle='#333'; sctx.lineWidth=1;
  sctx.beginPath();
  sctx.moveTo(SP+PAD_X, y+4);
  sctx.lineTo(W-SP-PAD_X, y+4);
  sctx.stroke();

  const now = new Date();
  sctx.fillStyle='#555';
  sctx.font='9px "Courier New",monospace';
  sctx.textAlign='center';
  sctx.fillText(
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`,
    W/2, y + FOOTER - 6
  );

  const link = document.createElement('a');
  link.download = `ArsaBooth-${Date.now()}.png`;
  link.href = sc.toDataURL('image/png');
  link.click();
}

function drawSprockets(sctx,W,H,SP){
  const hW=13,hH=9,hR=2,lx=3,rx=W-3-hW,count=12;
  for(let i=0;i<=count;i++){
    const y=((i/count)*(H-hH*2))+hH;
    sctx.fillStyle='#0C0820';
    rr(sctx,lx,y,hW,hH,hR);
    rr(sctx,rx,y,hW,hH,hR);
  }
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath(); ctx.fill();
}

function drawImg(ctx,src,x,y,w,h){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{ ctx.drawImage(img,x,y,w,h); res(); };
    img.onerror=res;
    img.src=src;
  });
}

/* Reset */
function resetSession(){
  capturedPhotos=[];
  for(let i=0;i<4;i++){
    const slot=document.getElementById('slot'+i);
    slot.className='photo-slot';
    slot.innerHTML=`<div class="empty-num">0${i+1}</div>`;
  }
  document.getElementById('stripDate').textContent='── ✦ ──';
  downloadBtn.disabled=true;
  if(stream) setStatus('Kamera siap! Pilih filter lalu tekan tombol foto.','active');
}

/* Boot */
video.style.display='none';
initCamera();
